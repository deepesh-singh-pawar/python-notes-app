<!DOCTYPE html>
<html>
<head>
    <title>My Python Notes App</title>
</head>

<body>

<h1>📒 My Notes App</h1>

<form method="POST">
    <input type="text" name="note" placeholder="Write your note" required>
    <button type="submit">Add Note</button>
</form>

<h2>Saved Notes</h2>

<ul>
    {% for note in notes %}
        <li>{{ note }}</li>
    {% endfor %}
</ul>

</body>
</html>
